# ?????????????????????????????????????????????????????????????????????????????
# AI Reporter Plugin Configuration
# ?????????????????????????????????????????????????????????????????????????????
#
# Place this file in: $JMETER_HOME/bin/
# To activate a provider, set its api.key(Mandatory Field). All other fields are optional.
#
# ?????????????????????????????????????????????????????????????????????????????
# Provider Order (optional)
# ?????????????????????????????????????????????????????????????????????????????
#
# Controls the order of providers in the UI dropdown and CLI selection.
# Comma-separated list of provider keys. Providers not listed here are appended alphabetically after the listed ones.
# If absent or blank, the built-in order is used: groq, gemini, mistral,deepseek, cerebras, openai, claude.
#
# ?????????????????????????????????????????????????????????????????????????????
#
#ai.reporter.order=cerebras,mistral,gemini,groq,deepseek,openai,claude
#
# ?? Groq (Free) ???????????????????????????????????????????????????????????????
# ai.reporter.groq.tier=Free
ai.reporter.groq.api.key=
ai.reporter.groq.model=llama-3.3-70b-versatile
ai.reporter.groq.base.url=https://api.groq.com/openai/v1
ai.reporter.groq.timeout.seconds=60
ai.reporter.groq.max.tokens=8192
ai.reporter.groq.temperature=0.3
