# ?? Ollama (Local / Free) ?????????????????????????????????????????????????????
# Requires Ollama installed and running locally: https://ollama.com
#
# Setup:
#   1. Install Ollama from https://ollama.com (Windows / macOS / Linux)
#   2. Pull a model:
#        ollama pull llama3.2          (~2 GB, fast, good quality)
#        ollama pull mistral            (~4 GB, strong reasoning)
#        ollama pull qwen2.5:7b         (~5 GB, strong analytical reasoning)
#   3. Ollama starts automatically on: http://localhost:11434
#   4. Uncomment the block below and set model= to your pulled model name.
#
# Notes:
#   - api.key must be non-blank; use any dummy value (e.g. ollama).
#   - Increase timeout.seconds for CPU-only machines (120?300 recommended).
#   - Performance depends on your hardware (GPU > CPU).
#
# ai.reporter.ollama.api.key=ollama
# ai.reporter.ollama.model=llama3.2
# ai.reporter.ollama.base.url=http://localhost:11434/v1
# ai.reporter.ollama.timeout.seconds=120
# ai.reporter.ollama.max.tokens=8192
# ai.reporter.ollama.temperature=0.3
# ?? Custom Provider (optional) ????????????????????????????????????????????????
# Any provider that exposes an OpenAI-compatible /v1/chat/completions endpoint.
# ai.reporter.myprovider.tier=Free or Paid
# ai.reporter.myprovider.api.key=
# ai.reporter.myprovider.model=
# ai.reporter.myprovider.base.url=
# ai.reporter.myprovider.timeout.seconds=60
# ai.reporter.myprovider.max.tokens=8192
# ai.reporter.myprovider.temperature=0.3
