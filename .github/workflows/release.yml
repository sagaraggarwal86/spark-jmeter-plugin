name: Release on Tag

on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean verify
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/jaar-jmeter-plugin-*.jar
            src/main/scripts/jaar-cli-report.bat
            src/main/scripts/jaar-cli-report.sh
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}