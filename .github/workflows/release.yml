name: Release on Tag

on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        run: mvn --batch-mode clean deploy -P release
        env:
          MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Package release assets
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          STAGE_DIR="jaar-jmeter-plugin-${VERSION}"
          mkdir -p "${STAGE_DIR}"
          cp target/jaar-jmeter-plugin-*.jar "${STAGE_DIR}/"
          cp src/main/scripts/jaar-cli-report.bat "${STAGE_DIR}/"
          cp src/main/scripts/jaar-cli-report.sh "${STAGE_DIR}/"
          cp docs/ai-reporter.properties "${STAGE_DIR}/"
          zip -r "jaar-jmeter-plugin-${VERSION}.zip" "${STAGE_DIR}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: jaar-jmeter-plugin-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
