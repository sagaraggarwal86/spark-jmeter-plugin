name: PR Review (Mistral)

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "lines=$(wc -l < pr.diff)" >> "$GITHUB_OUTPUT"

      - name: Review with Mistral
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DIFF_LINES: ${{ steps.diff.outputs.lines }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, re, subprocess, urllib.request

          marker = "<!-- mistral-pr-review -->"
          diff_lines = int(os.environ["DIFF_LINES"])

          if diff_lines > 2000:
              comment = f"{marker}\n**PR Review (Mistral)**: skipped — PR has {diff_lines} changed lines (limit: 2000). Please request human review."
          else:
              claude_md = pathlib.Path("CLAUDE.md").read_text()
              m = re.search(r"## Enforced invariants.*?(?=\n## )", claude_md, flags=re.DOTALL)
              invariants = m.group(0) if m else ""

              diff = pathlib.Path("pr.diff").read_text()[:60000]

              system_prompt = f"""You are a senior code reviewer for a JMeter listener plugin (Java, JMeter 5.6.3).

          Review the diff. Focus ONLY on:
          1. Violations of the project invariants (listed below) — reference by invariant number.
          2. Bugs — null handling, threading, resource leaks, incorrect logic.
          3. Security issues — injection, deserialization, secret leakage, unsafe I/O.

          Skip: style, naming preferences, comment density, formatting.

          Technical rules:
          - Target JMeter 5.6.3 exclusively. Do not recommend APIs outside 5.6.3.
          - Dependency direction (acyclic, must not be violated):
              parser is the leaf (no internal deps).
              listener.core -> parser
              ai.prompt -> parser
              report -> listener.core
              ai.provider -> ai.prompt
              ai.report -> {{ai.prompt, ai.provider, parser}}
              Entry points cli and listener.gui may import any package.
          - JaCoCo 80% BUNDLE line coverage gate; flag new code without tests.

          {invariants}

          Output format:
          - First line: verdict = PASS | CHANGES REQUESTED | BLOCKER.
          - Then findings grouped as **Invariants**, **Bugs**, **Security**.
          - If nothing to flag, say "Nothing to flag." concisely.
          """

              req = urllib.request.Request(
                  "https://api.mistral.ai/v1/chat/completions",
                  headers={
                      "Authorization": f"Bearer {os.environ['MISTRAL_API_KEY']}",
                      "Content-Type": "application/json",
                  },
                  data=json.dumps({
                      "model": "codestral-latest",
                      "temperature": 0.2,
                      "messages": [
                          {"role": "system", "content": system_prompt},
                          {"role": "user", "content": f"Diff:\n\n```diff\n{diff}\n```"},
                      ],
                  }).encode(),
              )
              with urllib.request.urlopen(req, timeout=180) as r:
                  body = json.loads(r.read())
              review = body["choices"][0]["message"]["content"]
              comment = f"{marker}\n### PR Review (Mistral `codestral-latest`)\n\n{review}"

          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]

          existing = subprocess.run(
              ["gh", "api", f"repos/{repo}/issues/{pr_number}/comments",
               "--jq", f'.[] | select(.body | startswith("{marker}")) | .id'],
              capture_output=True, text=True, check=True,
          ).stdout.strip().splitlines()

          if existing:
              subprocess.run(
                  ["gh", "api", "--method", "PATCH",
                   f"repos/{repo}/issues/comments/{existing[0]}",
                   "-f", f"body={comment}"],
                  check=True,
              )
          else:
              subprocess.run(
                  ["gh", "pr", "comment", pr_number, "--body", comment],
                  check=True,
              )
          PY
